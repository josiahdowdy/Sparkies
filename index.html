<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#efeadd">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Sparkies</title>
<style>
  :root {
    --bg: #efeadd;
    --gold: #f7c948;
  }
  /* Sheet palettes — each one a step darker in value */
  body[data-sheet="sparks"] {
    --paper: #fcfbf6; --line: #d9d5c7; --ink: #3d3c36; --muted: #97948a;
  }
  body[data-sheet="lightning"] {
    --paper: #efe8d5; --line: #cdc3a8; --ink: #3f3a2c; --muted: #948d78;
  }
  body[data-sheet="thunderstorm"] {
    --paper: #b99e75; --line: #a3885c; --ink: #453922; --muted: #7d6a48;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    position: fixed;
    inset: 0;
    overflow: hidden;
    overscroll-behavior: none;
    width: 100%;
    height: 100%;
  }
  body {
    background: var(--bg);
    font-family: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    display: flex;
    flex-direction: column;
    padding: 10px 10px 4px;
    gap: 6px;
    height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ---------- Card ---------- */
  .card {
    position: relative;
    z-index: 0;
    flex: 1;
    min-height: 0;
    background: var(--paper);
    border-radius: 20px;
    box-shadow: 0 2px 6px rgba(60, 50, 30, .12), 0 12px 28px rgba(60, 50, 30, .10);
    padding: 20px 22px 22px;
    display: flex;
    flex-direction: column;
    transition: background .35s ease;
    touch-action: none;
  }

  /* Thunderstorm: a small cloud drifts across with an occasional lightning flash */
  .cloud-layer {
    display: none;
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    border-radius: inherit;
    z-index: -1;
  }
  body[data-sheet="thunderstorm"] .cloud-layer { display: block; }
  .cloud-drift {
    position: absolute;
    top: 12px;
    left: -20%;
    width: 38px;
    animation: driftAcross 26s linear infinite;
  }
  .cloud-shape {
    display: block;
    width: 100%;
    fill: none;
    stroke: rgba(255, 250, 235, .6);
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .cloud-bolt {
    position: absolute;
    left: 50%;
    top: 64%;
    width: 11px; height: 11px;
    transform: translateX(-50%);
    fill: rgba(255, 214, 90, 0);
    animation: boltFlash 5s ease-in-out infinite;
  }
  @keyframes driftAcross {
    from { left: -26%; }
    to { left: 126%; }
  }
  @keyframes boltFlash {
    0%, 65%, 100% { fill: rgba(255, 214, 90, 0); }
    68% { fill: rgba(255, 235, 180, .95); }
    71% { fill: rgba(255, 214, 90, .15); }
    74% { fill: rgba(255, 235, 180, .85); }
    78% { fill: rgba(255, 214, 90, 0); }
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
    transition: opacity .13s ease;
  }
  h1 {
    font-size: 17px;
    font-weight: 400;
    letter-spacing: .08em;
    color: var(--muted);
    padding-top: 2px;
    cursor: pointer;
  }
  h1:active { opacity: .6; }
  .title-edit {
    font: inherit;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: .08em;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--line);
    padding: 2px 0 0;
    margin-top: 2px;
    width: 150px;
    outline: none;
  }
  .corner { display: flex; align-items: flex-start; gap: 12px; }
  .datebox {
    border: none;
    border-bottom: 1.5px solid var(--line);
    background: transparent;
    min-width: 86px;
    text-align: center;
    font: inherit;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: .06em;
    padding: 6px 4px 3px;
    cursor: pointer;
  }
  .datebox:active { opacity: .6; }

  /* Thunderstorm: an infinity symbol with a light orbiting it forever */
  .infinity-wrap {
    position: relative;
    display: block;
    width: 34px;
    height: 18px;
    margin: 0 auto;
  }
  .inf-symbol {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    line-height: 1;
  }
  .glow-dot {
    position: absolute;
    top: 0;
    left: 0;
    width: 4px;
    height: 4px;
    margin: -2px 0 0 -2px;
    border-radius: 50%;
    background: radial-gradient(circle, #fffbe6, var(--gold) 60%, transparent 80%);
    box-shadow: 0 0 6px 2px rgba(247, 201, 72, .85);
    offset-path: path("M17 9 C17 3.5 12 3.5 8.5 9 C5 14.5 12 14.5 17 9 C17 3.5 24 3.5 25.5 9 C27 14.5 17 14.5 17 9 Z");
    offset-rotate: 0deg;
    animation: orbitFlow 7s linear infinite;
    pointer-events: none;
  }
  @keyframes orbitFlow {
    from { offset-distance: 0%; }
    to { offset-distance: 100%; }
  }
  .daydots { display: flex; flex-direction: column; gap: 5px; padding-top: 1px; }
  .daydots .dot {
    width: 11px; height: 11px;
    border: 1.5px solid var(--muted);
    border-radius: 50%;
    background: transparent;
    cursor: pointer;
    transition: background .15s ease;
  }
  .daydots .dot.on { background: var(--muted); }

  /* ---------- Task rows ---------- */
  .rows {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    transition: opacity .13s ease;
  }
  .card.sliding > .rows,
  .card.sliding > header {
    opacity: 0;
  }
  .row {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: flex-end;
    gap: 12px;
    padding-bottom: 2px;
    transition: transform .1s ease;
  }
  @keyframes rowShake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  .row.shake { animation: rowShake .3s ease; }
  .signal {
    flex: none;
    width: 22px; height: 22px;
    margin-bottom: 4px;
    border: 1.5px solid var(--muted);
    border-radius: 50%;
    background: transparent;
    position: relative;
    cursor: pointer;
    transition: background .2s ease;
  }
  .signal::before {
    content: "";
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 1.5px;
    margin-left: -0.75px;
    background: var(--muted);
  }
  .row.done .signal { background: var(--muted); }
  .row.done .signal::before { display: none; }
  @keyframes signalSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(90deg); }
  }
  .row.zap .signal { animation: signalSpin .4s ease-in-out forwards; }

  .line {
    flex: 1;
    min-width: 0;
    position: relative;
    border-bottom: 1.5px solid var(--line);
  }
  .line input {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    font: inherit;
    font-size: 16px;
    color: var(--ink);
    padding: 4px 2px 5px;
    user-select: text;
    transition: color .3s ease;
  }
  .row.done input { color: var(--muted); }

  /* strike-through line the bolt leaves behind */
  .strike {
    position: absolute;
    left: 0; top: 50%;
    height: 2px;
    width: 0;
    background: var(--ink);
    opacity: .65;
    pointer-events: none;
  }
  .row.done .strike { width: 100%; }
  .row.zap .strike { animation: grow .45s ease-in forwards; }
  @keyframes grow { from { width: 0; } to { width: 100%; } }

  /* the lightning bolt itself */
  .bolt {
    position: absolute;
    left: 0; top: 50%;
    width: 26px; height: 26px;
    transform: translate(-50%, -55%) rotate(14deg);
    fill: var(--gold);
    filter: drop-shadow(0 0 5px rgba(255, 214, 90, .95)) drop-shadow(0 0 14px rgba(255, 190, 40, .55));
    opacity: 0;
    pointer-events: none;
  }
  .row.zap .bolt { animation: zip .45s ease-in forwards; }
  @keyframes zip {
    0%   { left: 0%;   opacity: 0; }
    8%   { opacity: 1; }
    55%  { opacity: 1; }
    100% { left: 100%; opacity: 0; }
  }
  .row.zap .line { animation: flash .45s ease-out; }
  @keyframes flash {
    0%   { background: transparent; }
    35%  { background: rgba(255, 216, 90, .28); }
    100% { background: transparent; }
  }

  /* promote/demote-away when a task is sent to another sheet */
  @keyframes promoteOut {
    to { opacity: 0; transform: translateX(18px); }
  }
  @keyframes demoteOut {
    to { opacity: 0; transform: translateX(-18px); }
  }
  .row.promoting { animation: promoteOut .2s ease-in forwards; }
  .row.demoting { animation: demoteOut .2s ease-in forwards; }

  /* ---------- Promote control ---------- */
  .promote {
    flex: none;
    width: 22px; height: 22px;
    margin-bottom: 4px;
    border: none;
    background: transparent;
    padding: 0;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s ease;
  }
  .promote svg { width: 16px; height: 16px; fill: var(--muted); }
  .row.has-text .promote { opacity: .5; pointer-events: auto; }
  .promote:active svg { fill: var(--gold); }
  body[data-sheet="sparks"] .promote {
    width: 0;
    margin-left: -12px;
    opacity: 0 !important;
    pointer-events: none !important;
  }

  /* ---------- Pager (swipe between sheets) ---------- */
  .pager {
    flex: none;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 4px 0 6px;
  }
  .pdot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid #b7ae99;
    background: transparent;
    padding: 0;
    cursor: pointer;
    transition: transform .15s ease, background .15s ease, border-color .15s ease;
  }
  .pdot.active {
    background: #6b6353;
    border-color: #6b6353;
    transform: scale(1.3);
  }

  /* snap signals/dots instantly when switching sheets (paper still cross-fades) */
  body.switching .signal,
  body.switching .dot { transition: none; }

  /* ---------- Task count badge ---------- */
  .pager { position: relative; }
  .count {
    position: absolute;
    right: 2px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: #a89f8a;
    letter-spacing: .04em;
  }

  /* ---------- Undo toast ---------- */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 46px;
    transform: translate(-50%, 10px);
    display: flex;
    align-items: center;
    gap: 14px;
    background: #33302a;
    color: #f2ede0;
    font-size: 13px;
    font-family: inherit;
    padding: 10px 16px;
    border-radius: 999px;
    box-shadow: 0 8px 22px rgba(0, 0, 0, .28);
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
    z-index: 50;
  }
  .toast.show {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, 0);
  }
  .toast button {
    background: none;
    border: none;
    color: var(--gold);
    font: inherit;
    font-weight: 600;
    letter-spacing: .04em;
    cursor: pointer;
    padding: 0;
  }

  /* ---------- Drag to reorder ---------- */
  .row.dragging {
    transition: none;
    z-index: 5;
    background: var(--paper);
    border-radius: 8px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, .2);
  }
</style>
</head>
<body data-sheet="sparks">

  <main class="card">
    <div class="cloud-layer" aria-hidden="true">
      <div class="cloud-drift">
        <svg class="cloud-shape" viewBox="0 0 24 24">
          <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
        </svg>
        <svg class="cloud-bolt" viewBox="0 0 24 24"><path d="M13 1 3.5 13.5H10L8.5 23 19 10.5h-6.5L13 1z"/></svg>
      </div>
    </div>
    <header>
      <h1 id="sheetName">Sparks</h1>
      <div class="corner">
        <button class="datebox" id="dateBox" type="button" aria-label="Clear this sheet's tasks"></button>
        <div class="daydots">
          <button class="dot" data-dot="0" title="Morning" aria-label="Morning"></button>
          <button class="dot" data-dot="1" title="Afternoon" aria-label="Afternoon"></button>
          <button class="dot" data-dot="2" title="Evening" aria-label="Evening"></button>
        </div>
      </div>
    </header>
    <div class="rows" id="rows"></div>
  </main>

  <nav class="pager" id="pager">
    <button class="pdot" data-sheet="sparks" aria-label="Sparks"></button>
    <button class="pdot" data-sheet="lightning" aria-label="Lightning"></button>
    <button class="pdot" data-sheet="thunderstorm" aria-label="Thunderstorm"></button>
    <span class="count" id="taskCount"></span>
  </nav>

  <div class="toast" id="undoToast">
    <span id="undoText"></span>
    <button id="undoBtn" type="button">Undo</button>
  </div>

<script>
(() => {
  const SHEETS = ["sparks", "lightning", "thunderstorm"];
  const DEFAULT_NAMES = { sparks: "Sparks", lightning: "Lightning", thunderstorm: "Thunderstorm" };
  const N = 10;
  const KEY = "sparkies-v1";

  const blankSheet = () => ({
    tasks: Array.from({ length: N }, () => ({ t: "", d: false })),
    dots: [false, false, false],
  });

  let state;
  try { state = JSON.parse(localStorage.getItem(KEY)) || {}; } catch { state = {}; }
  for (const s of SHEETS) if (!state[s]) state[s] = blankSheet();
  if (!SHEETS.includes(state.current)) state.current = "sparks";
  if (!state.names) state.names = {};
  for (const s of SHEETS) if (!state.names[s]) state.names[s] = DEFAULT_NAMES[s];

  const save = () => localStorage.setItem(KEY, JSON.stringify(state));

  // ---------- Undo toast for destructive clears ----------
  const undoToastEl = document.getElementById("undoToast");
  const undoTextEl = document.getElementById("undoText");
  const undoBtnEl = document.getElementById("undoBtn");
  let undoSnapshot = null, undoTimer = null;

  function hideUndo() {
    clearTimeout(undoTimer);
    undoToastEl.classList.remove("show");
    undoSnapshot = null;
  }
  function showUndo(label, sheetKey, previousData) {
    clearTimeout(undoTimer);
    undoSnapshot = { sheetKey, data: previousData };
    undoTextEl.textContent = label;
    undoToastEl.classList.add("show");
    undoTimer = setTimeout(hideUndo, 5000);
  }
  undoBtnEl.addEventListener("click", () => {
    if (!undoSnapshot) return;
    state[undoSnapshot.sheetKey] = undoSnapshot.data;
    hideUndo();
    save();
    render();
  });

  // Top-right date box: a plain date on Sparks, month + week-of-month on
  // Lightning, and an animated infinity symbol on Thunderstorm (someday
  // has no deadline). Tapping it clears the sheet you're looking at.
  const dateBoxEl = document.getElementById("dateBox");
  function renderDateBox() {
    const now = new Date();
    if (state.current === "thunderstorm") {
      dateBoxEl.innerHTML =
        '<span class="infinity-wrap"><span class="inf-symbol">♾️</span><span class="glow-dot"></span></span>';
    } else if (state.current === "lightning") {
      const week = Math.ceil(now.getDate() / 7);
      dateBoxEl.textContent = now.toLocaleDateString("en-US", { month: "short" }) + " Wk " + week;
    } else {
      dateBoxEl.textContent = now.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }
  }
  dateBoxEl.addEventListener("click", () => {
    const sheet = state[state.current];
    const hasContent = sheet.tasks.some((t) => t.t) || sheet.dots.some(Boolean);
    if (!hasContent) return;
    if (!confirm("Clear all " + state.names[state.current] + " tasks?")) return;
    const snapshot = JSON.parse(JSON.stringify(sheet));
    const key = state.current;
    const name = state.names[key];
    state[key] = blankSheet();
    save();
    render();
    showUndo("Cleared " + name, key, snapshot);
  });

  const rowsEl = document.getElementById("rows");
  const rowEls = [];

  for (let i = 0; i < N; i++) {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML =
      '<button class="signal" aria-label="Complete task"></button>' +
      '<div class="line">' +
        '<input type="text" maxlength="25" autocomplete="off" autocapitalize="off" spellcheck="false">' +
        '<div class="strike"></div>' +
        '<svg class="bolt" viewBox="0 0 24 24"><path d="M13 1 3.5 13.5H10L8.5 23 19 10.5h-6.5L13 1z"/></svg>' +
      '</div>' +
      '<button class="promote" aria-label="Promote task">' +
        '<svg viewBox="0 0 24 24"><path d="M13 1 3.5 13.5H10L8.5 23 19 10.5h-6.5L13 1z"/></svg>' +
      '</button>';
    rowsEl.appendChild(row);
    rowEls.push(row);

    const input = row.querySelector("input");
    input.addEventListener("input", () => {
      state[state.current].tasks[i].t = input.value;
      row.classList.toggle("has-text", input.value.length > 0);
      save();
      updateCount();
    });
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && i < N - 1) rowEls[i + 1].querySelector("input").focus();
    });

    row.querySelector(".promote").addEventListener("click", () => promoteTask(i));

    row.querySelector(".signal").addEventListener("click", () => {
      const task = state[state.current].tasks[i];
      if (!task.d) {
        task.d = true;
        save();
        row.classList.add("zap");
        setTimeout(() => { row.classList.remove("zap"); row.classList.add("done"); }, 460);
      } else {
        task.d = false;
        save();
        row.classList.remove("done", "zap");
      }
    });
  }

  const dotEls = [...document.querySelectorAll(".daydots .dot")];
  dotEls.forEach((dot, i) => {
    dot.addEventListener("click", () => {
      const dots = state[state.current].dots;
      dots[i] = !dots[i];
      save();
      dot.classList.toggle("on", dots[i]);
    });
  });

  // ---------- Promote a task up to the next lighter sheet ----------
  function promoteTask(i) {
    const idx = SHEETS.indexOf(state.current);
    if (idx <= 0) return; // Sparks is already the top of the chain
    const targetKey = SHEETS[idx - 1];
    const target = state[targetKey];
    const slot = target.tasks.findIndex((t) => t.t === "");
    const row = rowEls[i];
    const task = state[state.current].tasks[i];
    if (!task.t) return;
    if (slot === -1) {
      row.classList.remove("shake");
      void row.offsetWidth; // restart animation if fired back to back
      row.classList.add("shake");
      return;
    }
    row.classList.add("promoting");
    setTimeout(() => {
      target.tasks[slot] = { t: task.t, d: false };
      task.t = "";
      task.d = false;
      save();
      render();
    }, 200);
  }

  // ---------- Demote a task down to the next heavier sheet ----------
  function demoteTask(i) {
    const idx = SHEETS.indexOf(state.current);
    if (idx >= SHEETS.length - 1) return; // Thunderstorm is already the bottom of the chain
    const targetKey = SHEETS[idx + 1];
    const target = state[targetKey];
    const slot = target.tasks.findIndex((t) => t.t === "");
    const row = rowEls[i];
    const task = state[state.current].tasks[i];
    if (!task.t) return;
    if (slot === -1) {
      row.classList.remove("shake");
      void row.offsetWidth;
      row.classList.add("shake");
      return;
    }
    row.classList.add("demoting");
    setTimeout(() => {
      target.tasks[slot] = { t: task.t, d: false };
      task.t = "";
      task.d = false;
      save();
      render();
    }, 200);
  }

  // ---------- Hold a line and drag it up/down to reorder ----------
  let reorderDragging = false;
  let dragTimer = null, dragArmed = false, dragRow = null;
  let dragFromIndex = -1, dragOverIndex = -1;
  let dragStartX = 0, dragStartY = 0, dragRowHeight = 0, dragPointerId = null;

  function applyDragShifts() {
    rowEls.forEach((r, idx) => {
      if (idx === dragFromIndex) return;
      let shift = 0;
      if (dragFromIndex < dragOverIndex && idx > dragFromIndex && idx <= dragOverIndex) shift = -1;
      else if (dragFromIndex > dragOverIndex && idx >= dragOverIndex && idx < dragFromIndex) shift = 1;
      r.style.transform = shift ? `translateY(${shift * dragRowHeight}px)` : "";
    });
  }

  function finishDrag() {
    reorderDragging = false;
    if (dragOverIndex !== dragFromIndex) {
      const tasks = state[state.current].tasks;
      const moved = tasks.splice(dragFromIndex, 1)[0];
      tasks.splice(dragOverIndex, 0, moved);
      save();
    }
    dragRow.classList.remove("dragging");
    rowEls.forEach((r) => { r.style.transform = ""; });
    render();
  }

  rowEls.forEach((row, i) => {
    row.addEventListener("pointerdown", (e) => {
      if (e.target.closest("button")) return;
      dragRow = row;
      dragFromIndex = i;
      dragOverIndex = i;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragArmed = false;
      dragPointerId = e.pointerId;
      clearTimeout(dragTimer);
      dragTimer = setTimeout(() => {
        dragArmed = true;
        reorderDragging = true;
        dragRowHeight = row.getBoundingClientRect().height;
        row.setPointerCapture(dragPointerId);
        row.classList.add("dragging");
      }, 500);
    });

    row.addEventListener("pointermove", (e) => {
      if (dragRow !== row) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      if (!dragArmed) {
        if (Math.abs(dx) > 10 || Math.abs(dy) > 10) clearTimeout(dragTimer);
        return;
      }
      e.preventDefault();
      row.style.transform = `translateY(${dy}px)`;
      const shift = Math.round(dy / dragRowHeight);
      const newOver = Math.min(N - 1, Math.max(0, dragFromIndex + shift));
      if (newOver !== dragOverIndex) {
        dragOverIndex = newOver;
        applyDragShifts();
      }
    });

    row.addEventListener("pointerup", () => {
      clearTimeout(dragTimer);
      if (dragArmed) finishDrag();
      dragRow = null;
      dragArmed = false;
    });
    row.addEventListener("pointercancel", () => {
      clearTimeout(dragTimer);
      if (dragArmed) finishDrag();
      dragRow = null;
      dragArmed = false;
    });
  });

  // ---------- Title: tap clears completed tasks, long-press renames ----------
  const titleEl = document.getElementById("sheetName");

  function clearCompleted() {
    const sheet = state[state.current];
    if (!sheet.tasks.some((t) => t.d)) return;
    const snapshot = JSON.parse(JSON.stringify(sheet));
    const key = state.current;
    const name = state.names[key];
    sheet.tasks.forEach((t) => {
      if (t.d) { t.t = ""; t.d = false; }
    });
    save();
    render();
    showUndo("Cleared completed on " + name, key, snapshot);
  }

  function startRenaming() {
    titleEl.style.display = "none";
    const input = document.createElement("input");
    input.type = "text";
    input.className = "title-edit";
    input.maxLength = 16;
    input.value = state.names[state.current];
    titleEl.insertAdjacentElement("afterend", input);
    input.focus();
    input.select();

    function finish(shouldSave) {
      input.removeEventListener("blur", onBlur);
      const val = input.value.trim();
      if (shouldSave && val) {
        state.names[state.current] = val;
        save();
      }
      input.remove();
      titleEl.style.display = "";
      render();
    }
    function onBlur() { finish(true); }
    input.addEventListener("blur", onBlur);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") input.blur();
      if (e.key === "Escape") finish(false);
    });
  }

  let titleTimer = null, titleDownX = 0, titleDownY = 0, titleLongPressed = false;
  titleEl.addEventListener("pointerdown", (e) => {
    titleDownX = e.clientX;
    titleDownY = e.clientY;
    titleLongPressed = false;
    clearTimeout(titleTimer);
    titleTimer = setTimeout(() => {
      titleLongPressed = true;
      startRenaming();
    }, 500);
  });
  titleEl.addEventListener("pointermove", (e) => {
    if (Math.abs(e.clientX - titleDownX) > 10 || Math.abs(e.clientY - titleDownY) > 10) {
      clearTimeout(titleTimer);
    }
  });
  titleEl.addEventListener("pointerup", () => {
    clearTimeout(titleTimer);
    if (!titleLongPressed) clearCompleted();
  });
  titleEl.addEventListener("pointercancel", () => clearTimeout(titleTimer));

  // ---------- Pager: dots + swipe between sheets ----------
  const card = document.querySelector(".card");
  const pagerEls = [...document.querySelectorAll(".pdot")];

  function goToSheet(name) {
    if (name === state.current || !SHEETS.includes(name)) return;
    state.current = name;
    save();
    card.classList.add("sliding");
    setTimeout(() => {
      render();
      requestAnimationFrame(() => card.classList.remove("sliding"));
    }, 130);
  }

  pagerEls.forEach((dot) => {
    dot.addEventListener("click", () => goToSheet(dot.dataset.sheet));
  });

  // Swiping an empty row (or the header/margins) pages between sheets.
  // Swiping directly on a task that has text promotes (swipe right) or
  // demotes (swipe left) that task instead.
  let swipeX = null, swipeY = null, swiping = false, swipeRow = null, swipeCommitted = false;
  card.addEventListener("pointerdown", (e) => {
    if (e.target.closest("button")) return;
    swipeX = e.clientX;
    swipeY = e.clientY;
    swiping = true;
    swipeCommitted = false;
    const rowEl = e.target.closest(".row");
    swipeRow = rowEl && rowEl.classList.contains("has-text") ? rowEl : null;
  });
  card.addEventListener("pointermove", (e) => {
    if (reorderDragging) return;
    if (!swiping) return;
    const dx = e.clientX - swipeX;
    const dy = e.clientY - swipeY;
    // Once a horizontal drag is clearly underway, stop the browser from
    // treating it as native text selection/caret dragging inside the input.
    if (!swipeCommitted && Math.abs(dx) > 10 && Math.abs(dx) > Math.abs(dy)) {
      swipeCommitted = true;
    }
    if (swipeCommitted) e.preventDefault();
  });
  card.addEventListener("pointerup", (e) => {
    if (reorderDragging) return;
    if (!swiping) return;
    swiping = false;
    const dx = e.clientX - swipeX;
    const dy = e.clientY - swipeY;
    if (Math.abs(dx) < 55 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    if (swipeRow) {
      const i = rowEls.indexOf(swipeRow);
      if (dx > 0) promoteTask(i);
      else demoteTask(i);
      return;
    }
    const idx = SHEETS.indexOf(state.current);
    if (dx < 0 && idx < SHEETS.length - 1) goToSheet(SHEETS[idx + 1]);
    else if (dx > 0 && idx > 0) goToSheet(SHEETS[idx - 1]);
  });
  card.addEventListener("pointercancel", () => { swiping = false; swipeRow = null; });

  function render() {
    const sheet = state[state.current];
    document.body.classList.add("switching");
    requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.remove("switching")));
    document.body.dataset.sheet = state.current;
    document.getElementById("sheetName").textContent = state.names[state.current];
    renderDateBox();
    const idx = SHEETS.indexOf(state.current);
    rowEls.forEach((row, i) => {
      const task = sheet.tasks[i];
      row.querySelector("input").value = task.t;
      row.classList.remove("zap", "promoting", "demoting", "shake");
      row.classList.toggle("done", task.d);
      row.classList.toggle("has-text", task.t.length > 0);
      const promoteBtn = row.querySelector(".promote");
      promoteBtn.title = idx > 0 ? "Send to " + state.names[SHEETS[idx - 1]] : "";
    });
    dotEls.forEach((dot, i) => dot.classList.toggle("on", sheet.dots[i]));
    pagerEls.forEach((dot) => {
      dot.classList.toggle("active", dot.dataset.sheet === state.current);
      dot.setAttribute("aria-label", state.names[dot.dataset.sheet]);
    });
    updateCount();
  }

  function updateCount() {
    const sheet = state[state.current];
    document.getElementById("taskCount").textContent =
      sheet.tasks.filter((t) => t.t).length + "/" + N;
  }

  render();
})();
</script>
</body>
</html>
